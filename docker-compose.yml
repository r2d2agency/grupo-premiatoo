# Local development: Postgres + backend + frontend
# Em produção no EasyPanel, crie 3 serviços separados (Postgres, backend, frontend)
# usando os mesmos Dockerfiles e variáveis abaixo.
version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: premiatto
      POSTGRES_PASSWORD: premiatto
      POSTGRES_DB: premiatto
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql://premiatto:premiatto@db:5432/premiatto
      JWT_SECRET: dev-secret-change-me
      ADMIN_EMAIL: admin@premiatto.com
      ADMIN_PASSWORD: premiatto123
      CORS_ORIGIN: http://localhost:3000
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - db

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: http://localhost:4000
    restart: always
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
